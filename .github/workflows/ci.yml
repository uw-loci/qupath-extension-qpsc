name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Checkout tiles-to-pyramid dependency
        uses: actions/checkout@v4
        with:
          repository: uw-loci/qupath-extension-tiles-to-pyramid
          # Must build tiles at the version qpsc's shadow("...tiles-to-pyramid:X.Y.Z")
          # in build.gradle.kts requires (currently 0.6.0). No v0.6.0 tag exists yet, so
          # pin the tiles main commit that IS version 0.6.0 (stable + reproducible).
          # Bump this whenever the shadow version bumps; switch to ref: vX.Y.Z once tagged.
          ref: 14dbe895100a8c7d1de2fe34052124e328908418
          path: tiles-to-pyramid

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: |
          chmod +x gradlew
          chmod +x tiles-to-pyramid/gradlew

      - name: Publish tiles-to-pyramid to local Maven
        run: |
          cd tiles-to-pyramid
          ./gradlew publishToMavenLocal
        shell: bash

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew build
        env:
          DISPLAY: ':99'

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew build

  screenshot-check:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git log date comparisons

      - name: Check documentation screenshots freshness
        run: bash tools/check-doc-images.sh --ci
