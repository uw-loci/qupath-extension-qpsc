name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Checkout tiles-to-pyramid dependency
        uses: actions/checkout@v4
        with:
          repository: uw-loci/qupath-extension-tiles-to-pyramid
          path: tiles-to-pyramid

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: |
          chmod +x gradlew
          chmod +x tiles-to-pyramid/gradlew

      - name: Publish tiles-to-pyramid to local Maven
        run: |
          cd tiles-to-pyramid
          ./gradlew publishToMavenLocal
        shell: bash

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew build
        env:
          DISPLAY: ':99'

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew build

  screenshot-check:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git log date comparisons

      - name: Check documentation screenshots freshness
        run: bash tools/check-doc-images.sh --ci
